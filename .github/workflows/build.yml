name: Build and Verify
permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
    - name: Install testdata tooling
      run: cd testdata && make init
    - name: Test
      run: make test

  regen-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
    - name: Install testdata tooling
      run: cd testdata && make init
    - name: Regenerate files
      run: make regen
    - name: Ensure generated files are committed
      run: git diff --exit-code
